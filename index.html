<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>FNAF Web Game</title><style>body{background:#222;color:#fff;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;}#game{background:#333;border-radius:16px;padding:32px;box-shadow:0 0 24px #000a;display:flex;flex-direction:column;align-items:center;min-width:350px;}.stat{font-size:1.3em;margin:8px;}.btn{margin:6px;padding:14px 24px;font-size:1em;border-radius:8px;border:none;background:#666;color:#fff;cursor:pointer;transition:background 0.2s;}.btn:hover{background:#888;}#message{margin-top:24px;font-size:1.2em;color:#ff7777;}</style></head><body><div id="game"><div class="stat" id="nightText">Night: 1</div><div class="stat" id="timeText">Time: 12 AM</div><div class="stat" id="powerText">Power: 100%</div><button class="btn" id="cameraButton">Camera</button><button class="btn" id="leftDoorButton">Left Door</button><button class="btn" id="rightDoorButton">Right Door</button><div id="message"></div></div><script>class Animatronic{constructor(name,difficulty){this.name=name;this.difficulty=difficulty;this.position=0;}move(){if(Math.random()<this.difficulty/20){this.position++;}}}let leftDoorClosed=false,rightDoorClosed=false;let hour=12,power=100,night=1,camera=1;let freddy=new Animatronic('Freddy',8),bonnie=new Animatronic('Bonnie',10),chica=new Animatronic('Chica',10),foxy=new Animatronic('Foxy',12),goldenFreddy=new Animatronic('Golden Freddy',2);let running=true,messageTimeout=null;const timeText=document.getElementById('timeText');const powerText=document.getElementById('powerText');const nightText=document.getElementById('nightText');const leftDoorButton=document.getElementById('leftDoorButton');const rightDoorButton=document.getElementById('rightDoorButton');const cameraButton=document.getElementById('cameraButton');const messageBox=document.getElementById('message');function showMessage(msg,time=2000){messageBox.textContent=msg;clearTimeout(messageTimeout);if(time>0){messageTimeout=setTimeout(()=>messageBox.textContent='',time);}}function updateUI(){timeText.textContent=`Time: ${hour} AM`;powerText.textContent=`Power: ${power}%`;nightText.textContent=`Night: ${night}`;leftDoorButton.textContent=leftDoorClosed?"Open Left Door":"Close Left Door";rightDoorButton.textContent=rightDoorClosed?"Open Right Door":"Close Right Door";}leftDoorButton.addEventListener('click',()=>{leftDoorClosed=!leftDoorClosed;showMessage(leftDoorClosed?"Left Door Closed!":"Left Door Opened!",1400);drainPower();updateUI();});rightDoorButton.addEventListener('click',()=>{rightDoorClosed=!rightDoorClosed;showMessage(rightDoorClosed?"Right Door Closed!":"Right Door Opened!",1400);drainPower();updateUI();});cameraButton.addEventListener('click',()=>{camera++;if(camera>7)camera=1;showMessage(`Camera ${camera}`,1200);drainPower();updateUI();});function drainPower(){let drain=1;if(leftDoorClosed)drain++;if(rightDoorClosed)drain++;power-=drain;if(power<=0){power=0;powerOut();}updateUI();}function resetAnimatronics(){freddy.position=0;bonnie.position=0;chica.position=0;foxy.position=0;goldenFreddy.position=0;leftDoorClosed=false;rightDoorClosed=false;}function jumpscare(){running=false;showMessage('JUMPSCARE! Game Over',5000);setTimeout(()=>location.reload(),5000);}function powerOut(){showMessage('Power Out!',2000);if(Math.random()<0.5)jumpscare();}function showGoldenFreddy(){showMessage('Golden Freddy Appeared!',1600);jumpscare();}function checkOfficeAttack(){if(bonnie.position>=5&&!leftDoorClosed)jumpscare();if(chica.position>=5&&!rightDoorClosed)jumpscare();if(freddy.position>=6)jumpscare();if(foxy.position>=4&&!leftDoorClosed)jumpscare();}function nextNight(){if(night<7){night++;hour=12;power=100;resetAnimatronics();showMessage(`Night ${night} begins!`,2000);setTimeout(startNight,2000);}else{running=false;showMessage('You survived all nights!',5000);}updateUI();}function updateGame(){if(!running)return;freddy.move();bonnie.move();chica.move();foxy.move();if(Math.random()<0.02)showGoldenFreddy();checkOfficeAttack();hour++;updateUI();if(hour<6&&running){setTimeout(updateGame,5000);}else if(running){nextNight();}}function startNight(){hour=12;power=100;resetAnimatronics();running=true;updateUI();setTimeout(updateGame,5000);}updateUI();startNight();</script></body></html>
